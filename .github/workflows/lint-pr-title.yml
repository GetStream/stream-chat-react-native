name: 'Lint PR title'

on:
  pull_request:
    branches:
      - develop
      - 'v[0-9]+.[0-9]+.[0-9]+'
    types: [opened, edited, synchronize]

jobs:
  lint_pr_title:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            refactor
            chore
            test
            perf
            ci
            build
            style
            revert
